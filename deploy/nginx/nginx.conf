user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Allow larger file uploads (e.g., multiple photos from phones)
    # Default is 1MB, but phone photos can be much larger
    # Set to 30M to allow up to 20M of images with buffer for other form data
    client_max_body_size 30M;

    # WebSocket support (ActionCable)
    # Sets proper Connection header depending on whether Upgrade header is present.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # HTTP server
    # Initially serves the app, then redirects to HTTPS after certificates are obtained
    # booksharecommunity.org / www.booksharecommunity.org redirect to givingshelf.net
    server {
        listen 80;
        server_name givingshelf.net www.givingshelf.net booksharecommunity.org www.booksharecommunity.org _;

        # For Let's Encrypt challenge (certbot for both domains)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP to HTTPS on givingshelf.net (including booksharecommunity.org)
        location / {
            # Redirect HTTP to HTTPS, and www to non-www
            if ($host = www.givingshelf.net) {
                return 301 https://givingshelf.net$request_uri;
            }
            if ($host = booksharecommunity.org) {
                return 301 https://givingshelf.net$request_uri;
            }
            if ($host = www.booksharecommunity.org) {
                return 301 https://givingshelf.net$request_uri;
            }
            return 301 https://givingshelf.net$request_uri;
            
            # Proxy to Rails app (comment this out after enabling HTTPS redirect)
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header Host $http_host;
            # proxy_set_header X-Forwarded-Proto $scheme;
            # proxy_pass http://web:3000;
            # proxy_http_version 1.1;
            # proxy_set_header Connection "";
        }

        # healthcheck
        location /healthz {
            return 200 "ok\n";
        }
    }

    # HTTPS server - www redirect to non-www
    server {
        listen 443 ssl http2;
        server_name www.givingshelf.net;
    
        # SSL certificates (same cert includes givingshelf.net + booksharecommunity.org after certbot --expand)
        ssl_certificate /etc/letsencrypt/live/givingshelf.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/givingshelf.net/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
    
        # Redirect www to non-www
        return 301 https://givingshelf.net$request_uri;
    }

    # HTTPS server - booksharecommunity.org → givingshelf.net (redirect)
    server {
        listen 443 ssl http2;
        server_name booksharecommunity.org www.booksharecommunity.org;

        # SSL certificates (same cert as givingshelf.net, expanded to include booksharecommunity.org)
        ssl_certificate /etc/letsencrypt/live/givingshelf.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/givingshelf.net/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        return 301 https://givingshelf.net$request_uri;
    }

    # HTTPS server - main site (non-www)
    # Uncomment this block after SSL certificates are obtained
    server {
        listen 443 ssl http2;
        server_name givingshelf.net;
    
        # SSL certificates
        ssl_certificate /etc/letsencrypt/live/givingshelf.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/givingshelf.net/privkey.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
    
        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    
        # Static assets served directly
        location ~ ^/(assets|packs|static|favicon.ico|robots.txt) {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires max;
            add_header Cache-Control public;
        }

        # ActionCable WebSocket endpoint
        location /cable {
            proxy_pass http://web:3000/cable;
            proxy_http_version 1.1;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Recommended for WebSockets
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering off;
        }
    
        # Proxy all requests to Rails app
        location / {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_redirect off;
        }
    
        # healthcheck
        location /healthz {
            return 200 "ok\n";
        }
    }
}

