user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    # HTTP server - allow access via EC2 DNS for testing
    server {
        listen 80;
        server_name booksharecommunity.org ec2-44-250-51-11.us-west-2.compute.amazonaws.com _;

        # For Let's Encrypt challenge (if setting up SSL later)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # For now, allow HTTP access (remove this when SSL is ready)
        location / {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # healthcheck
        location /healthz {
            return 200 "ok\n";
        }
    }

    # HTTPS server (uncomment when SSL certificates are ready)
    # server {
    #     listen 443 ssl;
    #     server_name booksharecommunity.org ec2-44-250-51-11.us-west-2.compute.amazonaws.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/booksharecommunity.org/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/booksharecommunity.org/privkey.pem;
    #
    #     root /app/public;
    #     index index.html;
    #
    #     # Static assets served directly
    #     location ~ ^/(assets|packs|static|favicon.ico|robots.txt) {
    #         try_files $uri @proxy;
    #         expires max;
    #         add_header Cache-Control public;
    #     }
    #
