name: Deploy to EC2

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if CI workflow completed successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 --decode > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@44.250.51.11 << 'EOF'
            cd /home/ubuntu/givingshelf
            
            # Check disk space before starting deployment
            echo "Checking disk space..."
            DISK_USAGE=$(df -h / | awk 'NR==2 {print $5}' | sed 's/%//')
            echo "Current disk usage: ${DISK_USAGE}%"
            
            if [ "$DISK_USAGE" -gt 85 ]; then
              echo "WARNING: Disk usage is at ${DISK_USAGE}%. Cleaning up Docker..."
              docker system prune -a --volumes -f
              DISK_USAGE=$(df -h / | awk 'NR==2 {print $5}' | sed 's/%//')
              echo "Disk usage after cleanup: ${DISK_USAGE}%"
              if [ "$DISK_USAGE" -gt 85 ]; then
                echo "ERROR: Disk usage still at ${DISK_USAGE}% after cleanup. Aborting deployment."
                exit 1
              fi
            fi
            # pull latest changes from main branch
            git fetch origin
            git reset --hard origin/${{ github.event.workflow_run.head_branch }}
            
            # fetch secrets
            sudo /usr/local/bin/fetch-givingshelf-secrets.sh
            
            # create sym link to the .env file
            rm -f .env
            ln -s /etc/givingshelf/.env.production .env
            sudo chmod 644 .env

            # Clean up old Docker images before building new ones
            echo "Cleaning up old Docker images..."
            docker image prune -f

            # Setup Docker log tailing for CloudWatch (if not already set up)
            if [ ! -f /etc/systemd/system/tail-docker-logs.service ]; then
              echo "Setting up Docker log tailing..."
              sudo bash deploy/setup-docker-logs.sh
            fi

            # Setup givingshelf systemd service for auto-start on reboot (if not already set up)
            if [ ! -f /etc/systemd/system/givingshelf.service ]; then
              echo "Setting up givingshelf service..."
              sudo cp deploy/givingshelf.service /etc/systemd/system/
              sudo systemctl daemon-reload
              sudo systemctl enable givingshelf.service
            fi

            # build image and start containers
            docker compose -f docker-compose.production.yml build web worker
            docker compose -f docker-compose.production.yml up -d --remove-orphans
            
            # wait for web container to be ready, then verify RDS connectivity via db:prepare
            echo "Waiting for web container to start..."
            sleep 10
            echo "Verifying RDS connectivity and preparing database..."
            
            # prepare database (creates if needed, then runs migrations - fails if RDS unreachable)
            docker compose -f docker-compose.production.yml exec web bundle exec rails db:prepare
            
            # generate sitemap
            echo "Generating sitemap..."
            docker compose -f docker-compose.production.yml exec web bundle exec rake sitemap:refresh || echo "Warning: Sitemap generation failed, continuing anyway..."
            
            # precompile assets if necessary  
            docker compose -f docker-compose.production.yml exec web bundle exec rails assets:precompile

            # restart givingshelf service
            sudo systemctl restart givingshelf.service
          EOF
  