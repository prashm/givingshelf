name: Deploy to EC2

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if CI workflow completed successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 --decode > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@44.250.51.11 << 'EOF'
            cd /home/ubuntu/bookshare
            
            # pull latest changes from main branch
            git fetch origin
            git reset --hard origin/${{ github.event.workflow_run.head_branch }}
            
            # fetch secrets
            sudo /usr/local/bin/fetch-bookshare-secrets.sh
            
            # create sym link to the .env file
            rm -f .env
            ln -s /etc/bookshare/.env.production .env
            sudo chmod 644 .env

            # build image and start containers
            docker compose -f docker-compose.production.yml build web worker
            docker compose -f docker-compose.production.yml up -d --remove-orphans
            
            # wait for database to be ready
            echo "Waiting for database to be ready..."
            timeout=60
            counter=0
            while [ "$(docker inspect -f '{{.State.Health.Status}}' bookshare-postgres 2>/dev/null)" != "healthy" ]; do
              if [ $counter -ge $timeout ]; then
                echo "Database failed to become ready within $timeout seconds"
                docker compose -f docker-compose.production.yml ps
                exit 1
              fi
              echo "Waiting for database... ($counter/$timeout)"
              sleep 2
              counter=$((counter + 2))
            done
            echo "Database is ready!"
            
            # prepare database (creates if needed, then runs migrations)
            docker compose -f docker-compose.production.yml exec web bundle exec rails db:prepare
            
            # precompile assets if necessary  
            docker compose -f docker-compose.production.yml exec web bundle exec rails assets:precompile

            # restart bookshare service
            sudo systemctl restart bookshare.service
          EOF
  