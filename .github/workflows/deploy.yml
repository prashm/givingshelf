name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 44.250.51.11 >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh ubuntu@44.250.51.11 << 'EOF'
            cd /home/ubuntu/bookshare
            git pull origin main
            docker compose build
            docker compose up -d
            sudo systemctl restart bookshare
          EOF

