
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: bookshare_dev
  username: bs_user
  password:

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "bookshare_test") %>
  username: <%= ENV.fetch("DATABASE_USERNAME", "bs_user") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "") %>
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>

# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: bookshare_prod
    username: <%= ENV["DATABASE_USERNAME"] %>
    password: <%= ENV["DATABASE_PASSWORD"] %>
    host: <%= ENV["DATABASE_HOST"] %>
    port: 5432
    sslmode: require # Example for services requiring SSL
  cache:
    <<: *default
    database: bookshare_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: bookshare_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: bookshare_production_cable
    migrations_paths: db/cable_migrate
