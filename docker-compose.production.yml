services:
  # ------------------------
  # RAILS APP
  # ------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: bookshare-web
    container_name: bookshare-web
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - db
    restart: unless-stopped
    command: bundle exec puma -C config/puma.rb
    expose:
      - "3000"
    volumes:
      - rails_storage:/rails/storage
      - rails_logs:/rails/log

  # ------------------------
  # DELAYED JOB WORKER
  # ------------------------
  worker:
    image: bookshare-web
    container_name: bookshare-worker
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - web
      - db
    restart: unless-stopped
    command: bundle exec rake jobs:work
    networks:
      - bookshare
  # ------------------------
  # POSTGRES DATABASE
  # ------------------------
  db:
    image: postgres:15
    container_name: bookshare-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bookshare

  # ------------------------
  # REDIS (CHAT + JOBS)
  # ------------------------
  redis:
    image: redis:7
    container_name: bookshare-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - bookshare

  # ------------------------
  # NGINX REVERSE PROXY
  # ------------------------
  nginx:
    image: nginx:stable-alpine
    container_name: bookshare-nginx
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/bookshare.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certbot:/etc/letsencrypt
      - ./deploy/nginx/www:/var/www/certbot
    networks:
      - bookshare
# ------------------------
# PERSISTENT VOLUMES
# ------------------------
volumes:
  redis_data:
  rails_storage:
  rails_logs:
  postgres_data:

networks:
  bookshare:
    driver: bridge