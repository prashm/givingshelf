services:
  # ------------------------
  # RAILS APP
  # ------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: bookshare-web
    container_name: bookshare-web
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped
    command: bundle exec puma -C config/puma.rb
    expose:
      - "3000"
    volumes:
      - rails_storage:/rails/storage
      - rails_logs:/rails/log
    networks:
      - bookshare

  # ------------------------
  # DELAYED JOB WORKER
  # ------------------------
  worker:
    image: bookshare-web
    container_name: bookshare-worker
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
      web:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped
    command: bin/jobs
    networks:
      - bookshare
  # ------------------------
  # POSTGRES DATABASE
  # ------------------------
  db:
    image: postgres:15
    container_name: bookshare-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bookshare
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ------------------------
  # REDIS (CHAT + JOBS)
  # ------------------------
  redis:
    image: redis:7
    container_name: bookshare-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - bookshare

  # ------------------------
  # NGINX REVERSE PROXY
  # ------------------------
  nginx:
    image: nginx:stable-alpine
    container_name: bookshare-nginx
    depends_on:
      web:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certbot:/etc/letsencrypt
      - ./deploy/nginx/www:/var/www/certbot
    networks:
      - bookshare

  # ------------------------
  # CERTBOT (SSL CERTIFICATES)
  # ------------------------
  certbot:
    image: certbot/certbot
    container_name: bookshare-certbot
    volumes:
      - ./deploy/nginx/certbot:/etc/letsencrypt
      - ./deploy/nginx/www:/var/www/certbot
    networks:
      - bookshare
    # This service runs on-demand, not as a persistent service
    profiles:
      - certbot
# ------------------------
# PERSISTENT VOLUMES
# ------------------------
volumes:
  redis_data:
  rails_storage:
  rails_logs:
  postgres_data:

networks:
  bookshare:
    driver: bridge