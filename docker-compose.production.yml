version: "3.9"

services:
  # ------------------------
  # RAILS APP
  # ------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: bookshare-web
    container_name: bookshare-web
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    expose:
      - "3000"
    volumes:
      - rails_storage:/rails/storage
      - rails_logs:/rails/log

  # ------------------------
  # DELAYED JOB WORKER
  # ------------------------
  worker:
    image: bookshare-web
    container_name: bookshare-worker
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - web
    restart: unless-stopped
    command: bundle exec rake jobs:work

  # ------------------------
  # REDIS (CHAT + JOBS)
  # ------------------------
  redis:
    image: redis:7
    container_name: bookshare-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # ------------------------
  # NGINX REVERSE PROXY
  # ------------------------
  nginx:
    image: nginx:stable-alpine
    container_name: bookshare-nginx
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certbot:/etc/letsencrypt
      - ./nginx/www:/var/www/certbot

# ------------------------
# PERSISTENT VOLUMES
# ------------------------
volumes:
  redis_data:
  rails_storage:
  rails_logs:
